<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapter 3 — The Night That Almost Didn't Happen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0a1a; }

    /* ── Phase containers ── */
    #phase1 { position: fixed; inset: 0; z-index: 1; }
    #phase2 { position: fixed; inset: 0; z-index: 2; opacity: 0; pointer-events: none;
              background: #0d0a1a; display: flex; align-items: center; justify-content: center; }
    #phase2.active { pointer-events: auto; }

    .char {
      position: absolute;
      bottom: 8vh;
      width: 22vw;
      max-width: 280px;
    }
    .char img { width: 100%; display: block; }
    #fox  { left: 8vw; }
    #bunny { right: 8vw; }

    /* Night lighting — multiply overlay */
    .char::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: rgba(20, 30, 80, 0.18);
      mix-blend-mode: multiply;
    }
    #fox::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(100deg,
        rgba(40,60,160,0.50) 0%, rgba(40,60,160,0.12) 30%,
        transparent 48%,
        rgba(200,120,20,0.22) 65%, rgba(200,120,20,0.55) 100%);
      mix-blend-mode: multiply;
    }
    #bunny::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(100deg,
        rgba(200,120,20,0.55) 0%, rgba(200,120,20,0.22) 35%,
        transparent 52%,
        rgba(40,60,160,0.12) 70%, rgba(40,60,160,0.50) 100%);
      mix-blend-mode: multiply;
    }

    /* Breathing animation */
    @keyframes breathe { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.012)} }
    #fox   { animation: breathe 4s ease-in-out infinite; }
    #bunny { animation: breathe 4s ease-in-out 2s infinite; }

    #narration {
      position: absolute;
      top: 38%;
      left: 50%;
      transform: translateX(-50%);
      width: 55%;
      text-align: center;
      font-family: 'Caveat', cursive;
      font-size: clamp(22px, 3.2vw, 46px);
      font-weight: 600;
      color: #FAFAF0;
      text-shadow: 0 0 40px rgba(120,100,220,0.5);
      line-height: 1.5;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="phase1">
    <div id="sky" style="position:absolute;inset:0;overflow:hidden;">
      <img id="skyBase" src="backgrounds/sky.png"
           style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
      <img id="skyOverlay" src="backgrounds/sky_overlays/frame1.png"
           style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;mix-blend-mode:screen;">
    </div>
    <div id="city" style="position:absolute;inset:0;overflow:hidden;">
      <img id="cityBase" src="backgrounds/city.png"
           style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
      <img id="cityOverlay" src="backgrounds/city_overlays/frame1.png"
           style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;mix-blend-mode:screen;">
    </div>
    <div class="char" id="fox">
      <img id="foxImg" src="../chapter1/animations/fox/pose1_neutral_idle/frame1.png" alt="">
    </div>
    <div class="char" id="bunny">
      <img id="bunnyImg" src="../chapter1/animations/bunny/pose1_neutral_idle/frame1.png" alt="">
    </div>
    <div id="narration"></div>
  </div>
  <div id="phase2"></div>
  <script>
    const BEATS = [
      { text: "There was a night that almost didn't exist.", fox: 'pose1_neutral_idle',  bunny: 'pose1_neutral_idle'     },
      { text: "A badminton session.",                        fox: 'pose4_pointing_up',   bunny: 'pose5_amused'           },
      { text: "A message.",                                  fox: 'pose6_finger_guns',   bunny: 'pose3_curious_pointing' },
      { text: "A low battery.",                              fox: 'pose3_shrug',         bunny: 'pose4_surprised'        },
      { text: "And somehow…",                           fox: 'pose1_neutral_idle',  bunny: 'pose6_warm_happy'       },
      { text: null, fox: null, bunny: null },
    ];

    const BAR_DATA = [
      { message: "you should stay a bit longer"                                    },
      { message: "i missed you more than i said"                                   },
      { message: "this night almost didn't happen"                                 },
      { message: "i almost didn't see it"                                          },
      { message: "the hours we stayed up talking"                                  },
      { message: "the smallest kind of brave"                                      },
      { message: "a second first night"                                            },
      { message: "if one notification didn't arrive…\nthis night wouldn't exist" },
    ];

    // Tune left/top/width/height after viewing actual chocolate_box_open.png
    const BAR_GRID = { cols: 4, rows: 2, left: 0.08, top: 0.38, width: 0.84, height: 0.50 };

    function startBackgroundLoops() {
      let skyFrame = 1;
      setInterval(() => {
        skyFrame = (skyFrame % 4) + 1;
        document.getElementById('skyOverlay').src = `backgrounds/sky_overlays/frame${skyFrame}.png`;
      }, 700);

      let cityFrame = 1;
      setInterval(() => {
        cityFrame = (cityFrame % 8) + 1;
        document.getElementById('cityOverlay').src = `backgrounds/city_overlays/frame${cityFrame}.png`;
      }, 220);
    }
    startBackgroundLoops();

    let foxFrameTimer = null;
    let bunnyFrameTimer = null;

    function setPose(character, poseName) {
      const imgEl = document.getElementById(character === 'fox' ? 'foxImg' : 'bunnyImg');
      const base = character === 'fox'
        ? `../chapter1/animations/fox/${poseName}/frame`
        : `../chapter1/animations/bunny/${poseName}/frame`;

      gsap.to(imgEl, { opacity: 0, duration: 0.15, onComplete: () => {
        // Clear old timer
        if (character === 'fox')   { clearInterval(foxFrameTimer);   foxFrameTimer   = null; }
        if (character === 'bunny') { clearInterval(bunnyFrameTimer); bunnyFrameTimer = null; }

        let frame = 1;
        imgEl.src = base + '1.png';
        gsap.to(imgEl, { opacity: 1, duration: 0.15 });

        const timer = setInterval(() => {
          frame = (frame % 5) + 1;
          imgEl.src = base + frame + '.png';
        }, 200);

        if (character === 'fox')   foxFrameTimer   = timer;
        if (character === 'bunny') bunnyFrameTimer = timer;
      }});
    }

    // Kick off default idle pose
    setPose('fox',   'pose1_neutral_idle');
    setPose('bunny', 'pose1_neutral_idle');

    function showText(text) {
      const el = document.getElementById('narration');
      gsap.to(el, { opacity: 0, duration: 0.3, onComplete: () => {
        el.textContent = text;
        gsap.to(el, { opacity: 1, duration: 0.5 });
      }});
    }

    function hideText() {
      gsap.to(document.getElementById('narration'), { opacity: 0, duration: 0.4 });
    }

    let currentBeat = -1;
    let beatTimer = null;
    let phase1Done = false;

    function advanceBeat() {
      if (phase1Done) return;
      currentBeat++;
      if (currentBeat >= BEATS.length) return;

      const beat = BEATS[currentBeat];

      if (beat.text === null) {
        // Silent beat — fade out then transition
        hideText();
        clearTimeout(beatTimer);
        setTimeout(startPhase2, 1500);
        return;
      }

      showText(beat.text);
      if (beat.fox)   setPose('fox',   beat.fox);
      if (beat.bunny) setPose('bunny', beat.bunny);

      clearTimeout(beatTimer);
      // 0.5s fade-in + 2s hold = 2.5s before auto-advance
      beatTimer = setTimeout(advanceBeat, 2500);
    }

    // Tap / click
    document.addEventListener('click', () => { clearTimeout(beatTimer); advanceBeat(); });

    // Scroll
    document.addEventListener('wheel', (e) => {
      e.preventDefault();
      clearTimeout(beatTimer);
      advanceBeat();
    }, { passive: false });

    // Touch swipe up
    let touchStartY = 0;
    document.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; }, { passive: true });
    document.addEventListener('touchend', (e) => {
      if (touchStartY - e.changedTouches[0].clientY > 30) { clearTimeout(beatTimer); advanceBeat(); }
    }, { passive: true });

    // Kick off first beat after short delay
    setTimeout(advanceBeat, 600);
  </script>
</body>
</html>
