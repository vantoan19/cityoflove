<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Wipe — Demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    background: #F4A7B9;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 32px;
    font-family: 'Caveat', cursive, sans-serif;
    color: #fff; user-select: none;
  }

  .label { font-size: 32px; }

  .btns { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }

  .btn {
    font-family: inherit; font-size: 22px; color: #fff;
    background: rgba(255,255,255,0.25); border: 1.5px solid rgba(255,255,255,0.6);
    border-radius: 6px; padding: 10px 22px; cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: rgba(255,255,255,0.45); }

  #cloud-overlay {
    position: fixed; inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 1000;
  }
</style>
</head>
<body>

<p class="label">Chapter 2 — pick a direction</p>

<div class="btns">
  <button class="btn" data-dir="rtl">← right to left</button>
  <button class="btn" data-dir="ltr">→ left to right</button>
  <button class="btn" data-dir="btt">↑ bottom to top</button>
  <button class="btn" data-dir="ttb">↓ top to bottom</button>
</div>

<div id="cloud-overlay"></div>

<script>
/* ─────────────────────────────────────────────
   Cloud Wipe Transition — four directions
   dir: 'rtl' | 'ltr' | 'btt' | 'ttb'
   Public API: window.runCloudTransition(onComplete, dir='rtl')
───────────────────────────────────────────── */
(function () {

  const overlay = document.getElementById('cloud-overlay');

  /* Build one cloud SVG for a given direction.
     The scalloped edge is always the LEADING edge. */
  function buildCloud(r, color, dir) {
    const VW = window.innerWidth, VH = window.innerHeight;
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.style.cssText =
      `position:absolute;top:0;left:0;width:${VW}px;height:${VH}px;` +
      `overflow:visible;will-change:transform;`;

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('fill', color);
    svg.appendChild(rect);

    let n, cx, cy;

    if (dir === 'rtl') {
      /* scalloped LEFT edge, solid fill extends RIGHT */
      n = Math.ceil(VH / (r * 2)) + 3;
      rect.setAttribute('x', r);        rect.setAttribute('y', -(r * 2));
      rect.setAttribute('width', VW * 3); rect.setAttribute('height', VH + r * 4);
      for (let i = -1; i <= n; i++) mkCircle(svg, r, i * r * 2 + r, r, color);

    } else if (dir === 'ltr') {
      /* scalloped RIGHT edge, solid fill extends LEFT */
      n = Math.ceil(VH / (r * 2)) + 3;
      rect.setAttribute('x', -(VW * 3)); rect.setAttribute('y', -(r * 2));
      rect.setAttribute('width', VW * 3 + VW - r); rect.setAttribute('height', VH + r * 4);
      for (let i = -1; i <= n; i++) mkCircle(svg, VW - r, i * r * 2 + r, r, color);

    } else if (dir === 'btt') {
      /* scalloped TOP edge, solid fill extends DOWN */
      n = Math.ceil(VW / (r * 2)) + 3;
      rect.setAttribute('x', -(r * 2)); rect.setAttribute('y', r);
      rect.setAttribute('width', VW + r * 4); rect.setAttribute('height', VH * 3);
      for (let i = -1; i <= n; i++) mkCircle(svg, i * r * 2 + r, r, r, color);

    } else if (dir === 'ttb') {
      /* scalloped BOTTOM edge, solid fill extends UP */
      n = Math.ceil(VW / (r * 2)) + 3;
      rect.setAttribute('x', -(r * 2)); rect.setAttribute('y', -(VH * 3));
      rect.setAttribute('width', VW + r * 4); rect.setAttribute('height', VH * 3 + VH - r);
      for (let i = -1; i <= n; i++) mkCircle(svg, i * r * 2 + r, VH - r, r, color);
    }

    return svg;
  }

  function mkCircle(svg, cx, cy, r, color) {
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', cx); c.setAttribute('cy', cy);
    c.setAttribute('r', r);   c.setAttribute('fill', color);
    svg.appendChild(c);
  }

  /* Animate a single cloud SVG. axis: 'x' | 'y' */
  function animateCloud(svg, start, end, axis, duration, delay, onDone) {
    const prop = axis === 'y' ? 'translateY' : 'translateX';
    svg.style.transform = `${prop}(${start}px)`;
    overlay.appendChild(svg);

    const eio = t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    let t0 = null;
    const go = ts => {
      if (!t0) t0 = ts;
      const p = Math.min((ts - t0) / duration, 1);
      svg.style.transform = `${prop}(${start + (end - start) * eio(p)}px)`;
      if (p < 1) requestAnimationFrame(go);
      else { overlay.removeChild(svg); if (onDone) onDone(); }
    };
    setTimeout(() => requestAnimationFrame(go), delay);
  }

  /* ─── Public API ─── */
  window.runCloudTransition = function (onComplete, dir) {
    dir = dir || 'rtl';
    const VW  = window.innerWidth, VH = window.innerHeight;
    const isH = dir === 'rtl' || dir === 'ltr';
    const R   = Math.round((isH ? VH : VW) / 9);   /* ~9 circles across leading axis */
    const DUR     = 420;   /* ms per wave                                              */
    const STAGGER = 260;   /* ms between wave starts — must be ≤ 0.646×DUR for no gap */

    const axis = isH ? 'x' : 'y';
    const dim  = isH ? VW : VH;
    let start, end;
    switch (dir) {
      case 'rtl': start =  dim; end = -dim * 3; break;
      case 'ltr': start = -dim; end =  dim * 3; break;
      case 'btt': start =  dim; end = -dim * 3; break;
      case 'ttb': start = -dim; end =  dim * 3; break;
    }

    /* Three waves, each starting STAGGER ms after the previous.
       STAGGER ≤ 0.646×DUR guarantees the next wave's leading edge
       always covers what the previous wave's trailing edge uncovers. */
    const waves = [
      { r: R,          color: '#FFB7C5' },
      { r: R * 0.92,   color: '#FFCCD7' },
      { r: R * 1.05,   color: '#FFB7C5' },
    ];

    waves.forEach((w, i) => {
      const svg = buildCloud(w.r, w.color, dir);
      animateCloud(svg, start, end, axis, DUR, i * STAGGER,
        i === waves.length - 1 ? onComplete : null);
    });
  };

  /* ── Demo buttons ── */
  let busy = false;
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (busy) return;
      busy = true;
      window.runCloudTransition(() => {
        document.body.style.background = '#1A2B5C';
        document.querySelector('.label').textContent = 'transition done ✓ — reload to try again';
        busy = false;
      }, btn.dataset.dir);
    });
  });

})();
</script>
</body>
</html>
